image: node:20-alpine

stages:
  - install
  - lint
  - build

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/
    - .next/cache/

install:
  stage: install
  script:
    - npm ci

lint:
  stage: lint
  script:
    - npm run lint
  needs: [install]

build:
  stage: build
  script:
    - npm run build
  needs: [install]
  variables:
    NEXT_PUBLIC_SUPABASE_URL: $NEXT_PUBLIC_SUPABASE_URL
    NEXT_PUBLIC_SUPABASE_ANON_KEY: $NEXT_PUBLIC_SUPABASE_ANON_KEY
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour
  only:
    - main
    - merge_requests
